<!doctype html>
<html lang="pt-BR">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/login.css" />
    <link rel="icon" href="assets/img/the-batman-logo.png" type="image/png" />
  </head>
  <body>
    <div class="icon-back" onclick="trocarSessao('hero')"></div>
    <div class="container">
      <div class="banner"></div>

            <h1>Login</h1>
          </div>
          <div class="subtitle">

        <div class="button">
          <button>login</button>

        <div class="register">
          <h3>

</html>
<script>
  function trocarPagina(pagina) {
    window.location = `${pagina}.html#hero`;
  }
</script>
